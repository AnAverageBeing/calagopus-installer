name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          # Collect every shell file in the project and lint it.
          mapfile -t files < <(find . -type f -name '*.sh' -not -path './.git/*')
          shellcheck -x "${files[@]}"
      - name: Check bash syntax
        run: |
          mapfile -t files < <(find . -type f -name '*.sh' -not -path './.git/*')
          for f in "${files[@]}"; do bash -n "$f"; done
